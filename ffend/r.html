<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Plant Joiner</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            padding: 20px;
        }

        .register-box {
            background: rgba(90, 143, 106, 0.3);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .register-box h2 {
            color: white;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .form-group select option {
            background: #2a2a2a;
            color: white;
        }

        .error-message {
            color: #ff4444;
            font-size: 12px;
            display: none;
            margin-top: 5px;
        }

        .success-message {
            color: #4CAF50;
            font-size: 12px;
            display: none;
            margin-top: 5px;
        }

        .create-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border-radius: 8px;
            text-align: center;
            color: white;
            font-weight: bold;
            text-decoration: none;
            display: block;
            margin-top: 10px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .create-btn:hover {
            transform: translateY(-2px);
        }

        .create-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
        }

        .login-link a {
            color: #f5f7f5;
            text-decoration: none;
            font-weight: bold;
        }

        .terms {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
        }

        .terms a {
            color: #f9f7f7;
        }
    </style>
</head>

<body>

<div class="video-background">
    <video autoplay muted loop>
        <source src="create account video.mp4" type="video/mp4">
    </video>
</div>

<div class="container">
    <div class="register-box">
        <h2>Create Account</h2>

        <form id="registerForm" onsubmit="return false;">
            <div class="form-group">
                <input type="text" id="name" placeholder="Full Name" required>
            </div>

            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required>
                <div class="error-message" id="emailError">
                    Please use one of the authorized emails
                </div>
            </div>

            <div class="form-group">
                <input type="tel" id="phone" placeholder="Phone Number (10 digits)" 
                       pattern="[0-9]{10}" maxlength="10" required>
                <div class="error-message" id="phoneError">
                    Please enter a valid 10-digit phone number
                </div>
            </div>

            <div class="form-group">
                <select id="plantCategory" required>
                    <option value="">Select Plant Category</option>
                    <option value="Flowering Plants">Flowering Plants</option>
                    <option value="Succulents & Cacti">Succulents & Cacti</option>
                    <option value="Foliage Plants">Foliage Plants</option>
                    <option value="Herbs & Vegetables">Herbs & Vegetables</option>
                    <option value="Trees & Shrubs">Trees & Shrubs</option>
                    <option value="Aquatic Plants">Aquatic Plants</option>
                </select>
            </div>

            <div class="form-group">
                <select id="relatedPlants" required>
                    <option value="">Select Related Plants</option>
                    <option value="Indoor Plants">Indoor Plants</option>
                    <option value="Outdoor Plants">Outdoor Plants</option>
                    <option value="Medicinal Plants">Medicinal Plants</option>
                    <option value="Ornamental Plants">Ornamental Plants</option>
                    <option value="Native Plants">Native Plants</option>
                    <option value="Exotic Plants">Exotic Plants</option>
                </select>
            </div>

            <button type="submit" class="create-btn" id="registerBtn" onclick="handleRegister(event)">
               Create Account
            </button>
        </form>

        <div class="login-link">
            <p>Already have an account?
                <a href="login.html">Log in</a>
            </p>
            <p class="terms">
                By signing up, you agree to our
                <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
            </p>
        </div>
    </div>
</div>

<!-- Include the shared data file -->
<script src="shared-data.js"></script>

<script>
    // Email validation
    document.getElementById('email').addEventListener('input', function () {
        const error = document.getElementById('emailError');
        const email = this.value.trim();
        
        if (email && !ALLOWED_EMAILS.includes(email.toLowerCase())) {
            error.style.display = 'block';
        } else {
            error.style.display = 'none';
        }
    });

    // Phone validation
    document.getElementById('phone').addEventListener('input', function () {
        const error = document.getElementById('phoneError');
        const phone = this.value.trim();
        
        // Only allow numbers
        this.value = this.value.replace(/[^0-9]/g, '');
        
        if (phone && !/^\d{10}$/.test(phone)) {
            error.style.display = 'block';
        } else {
            error.style.display = 'none';
        }
    });

    function validateForm() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const plantCategory = document.getElementById('plantCategory').value;
        const relatedPlants = document.getElementById('relatedPlants').value;

        // Check if all fields are filled
        if (!name || !email || !phone || !plantCategory || !relatedPlants) {
            alert('Please fill in all fields');
            return false;
        }

        // Validate email is in allowed list
        if (!ALLOWED_EMAILS.includes(email.toLowerCase())) {
            alert('This email is not authorized. Please use an authorized email address.');
            return false;
        }

        // Validate phone number
        if (!/^\d{10}$/.test(phone)) {
            alert('Please enter a valid 10-digit phone number');
            return false;
        }

        return true;
    }

    function handleRegister(event) {
        event.preventDefault();
        
        if (!validateForm()) {
            return;
        }

        // Disable button to prevent double submission
        const btn = document.getElementById('registerBtn');
        btn.disabled = true;
        btn.textContent = 'Creating Account...';

        // Collect user data
        const userData = {
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim().toLowerCase(),
            phone: document.getElementById('phone').value.trim(),
            contact: document.getElementById('email').value.trim().toLowerCase(), // Primary contact
            plantCategory: document.getElementById('plantCategory').value,
            relatedPlants: [document.getElementById('relatedPlants').value], // Store as array
            memberSince: new Date().toISOString(),
            registeredDate: new Date().toISOString()
        };

        console.log('Registering user with data:', userData);

        // Register the user (stores complete profile in shared-data.js)
        const registeredUser = registerUser(userData);

        if (registeredUser) {
            console.log('User registered successfully:', registeredUser);
            
            // Show success message
            alert('Registration successful! Please login with your email and OTP.');
            
            // Redirect to login after short delay
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 500);
        } else {
            console.error('Registration failed');
            alert('Registration failed. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    }

    // Debug: Check what's stored
    window.addEventListener('load', function() {
        console.log('Current user profiles:', JSON.parse(localStorage.getItem('userProfiles') || '{}'));
    });
</script>

</body>
</html>
