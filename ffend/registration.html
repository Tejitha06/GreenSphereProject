<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - GreenSphere</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            background-color: #1a2433; /* Fallback color matching your image */
            overflow: hidden;
        }

        /* The Main Split Layout */
        .main-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Left Side: Video Content */
        .left-side {
            flex: 1.2; /* Takes up more space like the image */
            position: relative;
            overflow: hidden;
        }

        .left-side video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Right Side: Form Container */
        .right-side {
            flex: 0.8;
            background:#1a2433; /* Matches the dark blue in your image */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Keep your existing Box Styles */
        .register-box {
            background: rgba(90, 143, 106, 0.1); /* Kept your specific green tint */
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .register-box h2 {
            color: #4CAF50; /* Green title like GreenSphere */
            text-align: left;
            margin-bottom: 5px;
            font-size: 28px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
        }
        .form-group select option {
    background-color: #1a2433;
    color: white;
}

        .error-message { color: #ff4444; font-size: 12px; display: none; margin-top: 5px; }

        .create-btn {
            width: 100%;
            padding: 14px;
            background: #28ca56; /* Solid vibrant green from image */
            border-radius: 8px;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }

        .create-btn:hover { background: #22b34a; }

        .login-link { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.7); }
        .login-link a { color: #4CAF50; text-decoration: none; font-weight: bold; }
        .terms { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 15px; text-align: center; }
    </style>
</head>

<body>

<div class="main-wrapper">
    <div class="left-side">
        <video autoplay muted loop>
            <source src="tulips.mp4" type="video/mp4">
        </video>
    </div>

    <div class="right-side">
        <div class="register-box">
            <h2>Join GreenSphere</h2>
            <p class="subtitle">Watch your garden grow as you join us.</p>

            <form id="registerForm" onsubmit="return false;">
                <div class="form-group">
                    <input type="text" id="name" placeholder="Full Name" required>
                </div>

                <div class="form-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="form-group">
                    <input type="tel" id="phone" placeholder="Phone Number" maxlength="10" required>
                </div>

                <div class="form-group">
                    <input type="password" id="password" placeholder="Create Password" required>
                </div>

                <div class="form-group">
                    <input type="password" id="confirmPassword" placeholder="Retype Password" required>
                    <p id="passwordError" class="error-message"></p>
                </div>

                <button type="submit" class="create-btn" id="registerBtn" onclick="handleRegister(event)">
                   Create Account
                </button>
            </form>

            <div class="login-link">
                <p>Already have an account? <a href="l1.html">Log in</a></p>
                <p class="terms">By signing up, you agree to our <a href="#">Terms</a></p>
            </div>
        </div>
    </div>
</div>
<script src="shared-data.js"></script>
<script>
    // Email is now open to any user - no validation needed

    // Phone validation
    document.getElementById('phone').addEventListener('input', function () {
        const error = document.getElementById('phoneError');
        const phone = this.value.trim();
        
        // Only allow numbers
        this.value = this.value.replace(/[^0-9]/g, '');
        
        if (phone && !/^\d{10}$/.test(phone)) {
            error.style.display = 'block';
        } else {
            error.style.display = 'none';
        }
    });

    // List of blocked fake/dummy email domains
    const BLOCKED_EMAIL_DOMAINS = [
        'test.com', 'test.co', 'test.org', 'test.net', 'test.io',
        'abc.com', 'example.com', 'placeholder.com', 'temp.com', 'temporary.com',
        'fake.com', 'dummy.com', '123.com', 'aaa.com', 'aaaa.com',
        'mail.tm', '10minutemail.com', 'tempmail.com', 'guerrillamail.com',
        'maildrop.cc', 'mailinator.com', 'emaildrop.com', 'temp-mail.org',
        'throwaway.email', 'yopmail.com', 'sharklasers.com'
    ];

    // Better email validation regex (RFC 5322 simplified)
    function isValidEmail(email) {
        // Basic format validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            return false;
        }
        
        // Check minimum length (most real emails are at least 5 chars before @)
        const [localPart, domain] = email.split('@');
        if (localPart.length < 2 || domain.length < 5) {
            return false;
        }
        
        // Check if using common dummy domain
        const lowerDomain = domain.toLowerCase();
        if (BLOCKED_EMAIL_DOMAINS.some(blocked => lowerDomain === blocked || lowerDomain.endsWith('.' + blocked))) {
            return false;
        }
        
        // Block common patterns like user@user.com, test@test.com
        const parts = domain.replace(/\.com|\.co|\.org|\.net|\.io/gi, '').toLowerCase();
        if (parts === localPart.toLowerCase()) {
            return false;
        }
        
        // Block obviously fake patterns
        if (/^(test|abc|demo|sample|temp|fake|dummy|aaa|zzz|123|000)@/.test(email)) {
            return false;
        }
        
        return true;
    }

    function validateForm() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value.trim();
        const confirmPassword = document.getElementById('confirmPassword').value.trim();
        const passwordError = document.getElementById('passwordError');

        // Check if all fields are filled
        if (!name || !email || !phone || !password || !confirmPassword) {
            alert('Please fill in all fields');
            return false;
        }

        // Validate email format AND check for fake emails
        if (!isValidEmail(email)) {
            alert('Please enter a valid email address. Temporary or dummy email addresses are not allowed.');
            return false;
        }

        // Validate phone number
        if (!/^\d{10}$/.test(phone)) {
            alert('Please enter a valid 10-digit phone number');
            return false;
        }

        // Validate password length
        if (password.length < 6) {
            passwordError.textContent = 'Password must be at least 6 characters long';
            passwordError.style.display = 'block';
            return false;
        }

        // Check if passwords match
        if (password !== confirmPassword) {
            passwordError.textContent = 'Passwords do not match';
            passwordError.style.display = 'block';
            return false;
        }

        passwordError.style.display = 'none';
        return true;
    }

     function handleRegister(event) {
        event.preventDefault();
        
        if (!validateForm()) {
            return;
        }

        // Disable button to prevent double submission
        const btn = document.getElementById('registerBtn');
        btn.disabled = true;
        btn.textContent = 'Creating Account...';

        // Collect user data to send to backend
        const userData = {
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim().toLowerCase(),
            phone: document.getElementById('phone').value.trim(),
            password: document.getElementById('password').value.trim()
        };

        console.log('Sending registration data to backend:', userData);

        // Send registration request to backend
        fetch('http://localhost:5000/api/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(userData)
        })
        .then(response => response.json())
        .then(data => {
            console.log('Backend response:', data);
            
            if (data.success) {
                console.log('User registered successfully:', data.user);
                
                // Also store in localStorage for consistency with current system
                const completeUserData = {
                    name: userData.name,
                    email: userData.email,
                    phone: userData.phone,
                    id: data.user.id,
                    contact: userData.email,
                    memberSince: new Date().toISOString(),
                    registeredDate: new Date().toISOString()
                };
                registerUser(completeUserData);
                
                // Store auth token
                localStorage.setItem('authToken', data.token);
                localStorage.setItem('currentUser', JSON.stringify(data.user));
                
                alert('Account created successfully! You are now registered.');
                
                // Redirect to dashboard directly (removed OTP step)
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            } else {
                console.error('Registration failed:', data.message);
                alert(`Registration failed: ${data.message || 'Unknown error'}`);
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        })
        .catch(error => {
            console.error('Error during registration:', error);
            alert('Error connecting to server. Please check if backend is running.');
            btn.disabled = false;
            btn.textContent = 'Create Account';
        });
    }

    // Debug: Check what's stored
    window.addEventListener('load', function() {
        console.log('Current user profiles:', JSON.parse(localStorage.getItem('userProfiles') || '{}'));
    }); 
</script>
</body>
</html>
